# Render Blueprint for the RealDoor / ProofSetu backend (Member 4).
# Render reads this file to create the service automatically.
# Frontend deploys separately on Vercel.
services:
  - type: web
    name: proofsetu-api
    runtime: python
    plan: free
    branch: develop
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SESSION_BACKEND
        value: memory            # no external Redis needed for the demo
      - key: SESSION_TTL_SECONDS
        value: "3600"
      - key: MAX_UPLOAD_MB
        value: "15"
      - key: OCR_PROVIDER
        value: fixture
      - key: VISION_PROVIDER
        value: fixture
      - key: RULE_INDEX
        value: keyword
      - key: CORS_ORIGINS
        value: ""                # set to the Vercel frontend URL once it exists
