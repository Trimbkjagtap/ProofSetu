<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>ProofSetu system architecture</title>
  <desc>Renter's browser to a Next.js frontend on Vercel, to a FastAPI backend on Render with safety middleware and deterministic modules, to external AI (OpenAI/Google Vision) and a frozen 2026 rule corpus. AI reads documents; the core is deterministic; a human decides.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#f8fafc"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">ProofSetu — System Architecture</text>
  <text x="600" y="64" text-anchor="middle" font-size="14" fill="#475569">Application-Readiness Copilot · the AI reads documents, the core stays deterministic</text>

  <!-- Legend -->
  <g font-size="12" fill="#334155">
    <circle cx="392" cy="88" r="6" fill="#10b981"/><text x="404" y="92">Deterministic core</text>
    <circle cx="560" cy="88" r="6" fill="#8b5cf6"/><text x="572" y="92">AI (external)</text>
    <circle cx="700" cy="88" r="6" fill="#f59e0b"/><text x="712" y="92">Safety guards</text>
    <rect x="820" y="82" width="14" height="12" rx="3" fill="#e2e8f0"/><text x="840" y="92">Frozen data</text>
  </g>

  <!-- ===================== RENTER ===================== -->
  <rect x="30" y="322" width="132" height="96" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="352" r="12" fill="#94a3b8"/>
  <rect x="72" y="368" width="48" height="30" rx="4" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="96" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Renter</text>

  <!-- ===================== FRONTEND ===================== -->
  <rect x="192" y="140" width="232" height="440" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="212" y="170" font-size="14" font-weight="700" fill="#1d4ed8">FRONTEND</text>
  <text x="212" y="187" font-size="11" fill="#3b82f6">Next.js 14 · React · Vercel</text>
  <line x1="212" y1="197" x2="404" y2="197" stroke="#bfdbfe" stroke-width="1.5"/>

  <g font-size="13">
    <rect x="212" y="210" width="192" height="40" rx="8" fill="#ffffff" stroke="#dbeafe"/><circle cx="230" cy="230" r="10" fill="#1d4ed8"/><text x="230" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text><text x="250" y="234" font-weight="600" fill="#0f172a">Consent</text>
    <rect x="212" y="256" width="192" height="40" rx="8" fill="#ffffff" stroke="#dbeafe"/><circle cx="230" cy="276" r="10" fill="#1d4ed8"/><text x="230" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text><text x="250" y="280" font-weight="600" fill="#0f172a">Profile · upload &amp; confirm</text>
    <rect x="212" y="302" width="192" height="40" rx="8" fill="#ffffff" stroke="#dbeafe"/><circle cx="230" cy="322" r="10" fill="#1d4ed8"/><text x="230" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text><text x="250" y="326" font-weight="600" fill="#0f172a">Fit Check</text>
    <rect x="212" y="348" width="192" height="40" rx="8" fill="#ffffff" stroke="#dbeafe"/><circle cx="230" cy="368" r="10" fill="#1d4ed8"/><text x="230" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text><text x="250" y="372" font-weight="600" fill="#0f172a">Readiness</text>
    <rect x="212" y="394" width="192" height="40" rx="8" fill="#ffffff" stroke="#dbeafe"/><circle cx="230" cy="414" r="10" fill="#1d4ed8"/><text x="230" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text><text x="250" y="418" font-weight="600" fill="#0f172a">Packet</text>
  </g>
  <rect x="212" y="448" width="192" height="46" rx="8" fill="#dbeafe"/>
  <text x="308" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">One API client · mock ⇄ live</text>
  <text x="308" y="483" text-anchor="middle" font-size="10.5" fill="#3b82f6">Accessible (WCAG 2.2 AA)</text>

  <!-- ===================== BACKEND ===================== -->
  <rect x="452" y="120" width="470" height="476" rx="16" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="472" y="150" font-size="14" font-weight="700" fill="#047857">BACKEND</text>
  <text x="472" y="167" font-size="11" fill="#059669">FastAPI · Python 3.12 · Render</text>
  <line x1="472" y1="177" x2="902" y2="177" stroke="#a7f3d0" stroke-width="1.5"/>

  <rect x="472" y="190" width="430" height="42" rx="9" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="687" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Safety middleware — output guard · input guard · eligibility refusal</text>

  <g>
    <rect x="472" y="248" width="208" height="78" rx="10" fill="#ffffff" stroke="#a7f3d0"/><rect x="472" y="248" width="6" height="78" rx="3" fill="#10b981"/><text x="492" y="280" font-size="13.5" font-weight="700" fill="#0f172a">Session store</text><text x="492" y="300" font-size="10.5" fill="#64748b">anonymous · TTL · delete</text>
    <rect x="694" y="248" width="208" height="78" rx="10" fill="#ffffff" stroke="#a7f3d0"/><rect x="694" y="248" width="6" height="78" rx="3" fill="#10b981"/><text x="714" y="280" font-size="13.5" font-weight="700" fill="#0f172a">Feature registry</text><text x="714" y="300" font-size="10.5" fill="#64748b">fields · purpose · retention</text>

    <rect x="472" y="336" width="208" height="78" rx="10" fill="#ffffff" stroke="#a7f3d0"/><rect x="472" y="336" width="6" height="78" rx="3" fill="#10b981"/><text x="492" y="368" font-size="13.5" font-weight="700" fill="#0f172a">Extraction pipeline</text><text x="492" y="388" font-size="10.5" fill="#64748b">validate · OCR/vision · PII</text>
    <rect x="694" y="336" width="208" height="78" rx="10" fill="#ffffff" stroke="#a7f3d0"/><rect x="694" y="336" width="6" height="78" rx="3" fill="#10b981"/><text x="714" y="368" font-size="13.5" font-weight="700" fill="#0f172a">Rules engine</text><text x="714" y="388" font-size="10.5" fill="#64748b">cited answer · math · abstain</text>

    <rect x="472" y="424" width="208" height="78" rx="10" fill="#ffffff" stroke="#a7f3d0"/><rect x="472" y="424" width="6" height="78" rx="3" fill="#10b981"/><text x="492" y="456" font-size="13.5" font-weight="700" fill="#0f172a">Checklist engine</text><text x="492" y="476" font-size="10.5" fill="#64748b">present/missing/expiring/expired</text>
    <rect x="694" y="424" width="208" height="78" rx="10" fill="#ffffff" stroke="#a7f3d0"/><rect x="694" y="424" width="6" height="78" rx="3" fill="#10b981"/><text x="714" y="456" font-size="13.5" font-weight="700" fill="#0f172a">Packet + PDF</text><text x="714" y="476" font-size="10.5" fill="#64748b">confirmed fields · never auto-send</text>
  </g>
  <text x="472" y="528" font-size="11" font-weight="600" fill="#047857">Deterministic: math · statuses · packet · guards · session lifecycle</text>
  <text x="472" y="546" font-size="11" fill="#059669">Contracts: /session · /documents · /rules/query · /checklist · /packet · /features</text>

  <!-- ===================== EXTERNAL AI + DATA ===================== -->
  <rect x="950" y="190" width="220" height="330" rx="16" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="970" y="220" font-size="14" font-weight="700" fill="#6d28d9">AI + FROZEN DATA</text>
  <text x="970" y="237" font-size="11" fill="#7c3aed">external services</text>
  <line x1="970" y1="247" x2="1150" y2="247" stroke="#ddd6fe" stroke-width="1.5"/>

  <rect x="968" y="258" width="184" height="70" rx="10" fill="#ffffff" stroke="#ddd6fe"/><rect x="968" y="258" width="6" height="70" rx="3" fill="#8b5cf6"/><text x="986" y="286" font-size="13" font-weight="700" fill="#0f172a">OpenAI Vision</text><text x="986" y="305" font-size="10.5" fill="#64748b">gpt-4o-mini · any layout</text>
  <rect x="968" y="336" width="184" height="70" rx="10" fill="#ffffff" stroke="#ddd6fe"/><rect x="968" y="336" width="6" height="70" rx="3" fill="#8b5cf6"/><text x="986" y="364" font-size="13" font-weight="700" fill="#0f172a">Google Vision</text><text x="986" y="383" font-size="10.5" fill="#64748b">OCR + source boxes</text>
  <rect x="968" y="426" width="184" height="72" rx="10" fill="#ffffff" stroke="#e2e8f0"/><rect x="968" y="426" width="6" height="72" rx="3" fill="#64748b"/><text x="986" y="454" font-size="13" font-weight="700" fill="#0f172a">Frozen 2026 rules</text><text x="986" y="473" font-size="10.5" fill="#64748b">LIHTC corpus + MTSP</text><text x="986" y="488" font-size="10.5" fill="#64748b">no live web search</text>

  <!-- ===================== ARROWS ===================== -->
  <line x1="162" y1="370" x2="190" y2="370" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="176" y="360" text-anchor="middle" font-size="10" fill="#475569">HTTPS</text>

  <line x1="424" y1="360" x2="450" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="437" y="350" text-anchor="middle" font-size="10" fill="#475569">JSON</text>

  <line x1="922" y1="330" x2="948" y2="300" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="936" y="316" text-anchor="middle" font-size="10" fill="#7c3aed">vision</text>
  <line x1="922" y1="430" x2="948" y2="455" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="936" y="452" text-anchor="middle" font-size="10" fill="#475569">rules</text>

  <!-- ===================== PRINCIPLE STRIP ===================== -->
  <rect x="30" y="620" width="1140" height="50" rx="12" fill="#0f172a"/>
  <text x="600" y="650" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">AI reads &amp; explains  ·  math, checklist &amp; packet are deterministic  ·  the renter confirms  ·  a human decides</text>
</svg>
